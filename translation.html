<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>翻译题 · 对照记忆卡片（真实数据版）</title>
    <script src="data/translations.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 12px;
        }
        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(4px);
            padding: 1.2rem 1rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 {
            font-weight: 500;
            color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 1rem;
            font-size: 1.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 small {
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.8;
            background: #1f4a5e;
            padding: 0.3rem 0.8rem;
            border-radius: 60px;
            border: 1px solid #8fc3d9;
        }
        .level-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }
        .level-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 8px 18px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #bfdef0;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(2px);
        }
        .level-btn:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.3);
        }
        .level-btn.active {
            background: #fad974;
            border-color: #ffe399;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
        }
        .card-item {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }
        .card-english {
            color: #e9f2f7;
            font-size: 0.9rem;
            line-height: 1.8;
            margin-bottom: 0.8rem;
            font-weight: 500;
        }
        .card-chinese {
            color: #fcdb7a;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 0.5rem;
            padding: 0.8rem;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            display: none;
        }
        .card-chinese.show {
            display: block;
        }
        .card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-small {
            padding: 6px 14px;
            font-size: 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.1s;
        }
        .btn-reveal {
            background: #264e63;
            color: #bfdef0;
            border: 1px solid #578aa3;
        }
        .btn-mark {
            background: #1d4d4b;
            color: #a5d6a7;
            border: 1px solid #479f9b;
        }
        .btn-mark.marked {
            background: #fad974;
            color: #1d3f4a;
            border-color: #ffe399;
        }
        .progress-bar {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            height: 6px;
            margin: 0 0 1rem;
            overflow: hidden;
        }
        .progress-fill {
            background: #fad974;
            height: 6px;
            border-radius: 30px;
            transition: width 0.25s ease;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .progress-text {
            color: #bfdef0;
            font-size: 0.9rem;
        }
        .progress-text strong {
            color: #fcdb7a;
        }
        .btn {
            background: #fad974;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #ffe399;
            letter-spacing: 0.3px;
            display: inline-block;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b3952b;
        }
        .intro-text {
            color: #bfdef0;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.2rem;
        }
        .intro-text strong {
            color: #fcdb7a;
        }
        @media (max-width: 480px) {
            .game-container {
                padding: 0.8rem 0.6rem;
                border-radius: 28px;
            }
            h1 {
                font-size: 1.1rem;
            }
            .card-english, .card-chinese {
                font-size: 0.82rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>📖 翻译题 <small>真实数据版 · 对照记忆</small></h1>

    <div class="level-grid" id="levelGrid"></div>

    <!-- Intro Screen -->
    <div class="screen active" id="screen-intro">
        <div class="intro-text">
            <p><strong>使用方法</strong></p>
            <p>• 选择上方单元，开始翻译练习</p>
            <p>• 先自己尝试翻译英文句子</p>
            <p>• 点击<strong>"查看翻译"</strong>对照标准答案</p>
            <p>• 会了就点<strong>"记住了"</strong>，不熟点<strong>"需复习"</strong></p>
            <p style="margin-top:0.8rem; color:#fcdb7a;">✨ 数据来源：ima 知识库真实翻译题</p>
        </div>
        <button class="btn" id="btn-start">▶ 开始学习</button>
    </div>

    <!-- Cards Screen -->
    <div class="screen" id="screen-cards">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div id="cards-container"></div>
        <div class="nav-bar">
            <span class="progress-text">进度: <strong id="card-progress">0/0</strong></span>
        </div>
    </div>

    <!-- Result Screen -->
    <div class="screen" id="screen-result">
        <div style="text-align:center;">
            <div style="font-size:1rem; color:#bfdef0; margin-bottom:0.5rem;">复习统计</div>
            <div style="font-size:2.5rem; font-weight:600; color:#fcdb7a; margin:0.5rem 0;" id="result-stats">0/0</div>
            <div style="color:#bfdef0; font-size:1rem; margin-bottom:1rem;" id="result-comment"></div>
            <div style="text-align:left; max-height:350px; overflow-y:auto; margin:1rem 0;" id="result-list"></div>
            <button class="btn" id="btn-restart">🔄 重新开始</button>
        </div>
    </div>
</div>

<script>
(function(){
    // 检查数据是否加载
    if (typeof TRANSLATIONS_DATA === 'undefined') {
        alert('数据未加载！请确保 data/translations.js 文件存在。');
        return;
    }

    const UNITS = ['U1', 'U3', 'U4', 'U6'];
    let currentUnitIndex = 0;
    let cardStates = [];

    const levelGrid = document.getElementById('levelGrid');
    const screenIntro = document.getElementById('screen-intro');
    const screenCards = document.getElementById('screen-cards');
    const screenResult = document.getElementById('screen-result');
    const cardsContainer = document.getElementById('cards-container');
    const progressFill = document.getElementById('progress-fill');
    const cardProgress = document.getElementById('card-progress');
    const btnStart = document.getElementById('btn-start');
    const btnRestart = document.getElementById('btn-restart');

    function showScreen(screen) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        screen.classList.add('active');
    }

    function renderLevels() {
        levelGrid.innerHTML = '';
        UNITS.forEach((unit, idx) => {
            const btn = document.createElement('button');
            btn.className = 'level-btn' + (idx === currentUnitIndex ? ' active' : '');
            btn.textContent = unit + ' (' + TRANSLATIONS_DATA[unit].length + '句)';
            btn.addEventListener('click', () => {
                currentUnitIndex = idx;
                renderLevels();
            });
            levelGrid.appendChild(btn);
        });
    }

    function startCards() {
        const unit = UNITS[currentUnitIndex];
        const translations = TRANSLATIONS_DATA[unit];
        cardStates = translations.map(() => ({ revealed: false, marked: false }));
        showScreen(screenCards);
        renderCards();
        updateProgress();
    }

    function renderCards() {
        const unit = UNITS[currentUnitIndex];
        const translations = TRANSLATIONS_DATA[unit];
        cardsContainer.innerHTML = '';
        
        translations.forEach((t, idx) => {
            const state = cardStates[idx];
            const div = document.createElement('div');
            div.className = 'card-item';
            div.innerHTML = `
                <div class="card-english">${t.english}</div>
                <div class="card-chinese ${state.revealed ? 'show' : ''}" id="chinese-${idx}">
                    <div style="font-size:0.75rem; font-weight:600; margin-bottom:0.3rem; color:#bfdef0; letter-spacing:1px;">📖 整句中文意思</div>
                    ${t.chinese}
                </div>
                <div class="card-actions">
                    <button class="btn-small btn-reveal" data-idx="${idx}">${state.revealed ? '🔒 隐藏翻译' : '👁 查看翻译'}</button>
                    <button class="btn-small btn-mark ${state.marked ? 'marked' : ''}" data-idx="${idx}">${state.marked ? '✅ 已记住' : '⭐ 记住了'}</button>
                </div>
            `;
            cardsContainer.appendChild(div);
        });

        cardsContainer.querySelectorAll('.btn-reveal').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                cardStates[idx].revealed = !cardStates[idx].revealed;
                const chinese = document.getElementById(`chinese-${idx}`);
                chinese.classList.toggle('show');
                e.target.textContent = cardStates[idx].revealed ? '🔒 隐藏翻译' : '👁 查看翻译';
                updateProgress();
            });
        });

        cardsContainer.querySelectorAll('.btn-mark').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                cardStates[idx].marked = !cardStates[idx].marked;
                e.target.classList.toggle('marked');
                e.target.textContent = cardStates[idx].marked ? '✅ 已记住' : '⭐ 记住了';
                updateProgress();
            });
        });
    }

    function updateProgress() {
        const unit = UNITS[currentUnitIndex];
        const total = TRANSLATIONS_DATA[unit].length;
        const revealed = cardStates.filter(s => s.revealed).length;
        const marked = cardStates.filter(s => s.marked).length;
        
        cardProgress.textContent = `${revealed}/${total} 查看 | ${marked}/${total} 记住`;
        progressFill.style.width = `${(revealed / total) * 100}%`;
    }

    function showResult() {
        const unit = UNITS[currentUnitIndex];
        const total = TRANSLATIONS_DATA[unit].length;
        const marked = cardStates.filter(s => s.marked).length;
        
        showScreen(screenResult);
        document.getElementById('result-stats').textContent = `${marked}/${total}`;
        
        let comment = '';
        if (marked >= total * 0.9) {
            comment = '🎉 优秀！翻译掌握得很好！';
        } else if (marked >= total * 0.7) {
            comment = '👍 良好！继续加油！';
        } else if (marked >= total * 0.5) {
            comment = '📖 及格了，但还需要加强！';
        } else {
            comment = '💪 加油！多复习几遍！';
        }
        document.getElementById('result-comment').textContent = comment;
        
        const resultList = document.getElementById('result-list');
        resultList.innerHTML = '';
        cardStates.forEach((state, idx) => {
            const t = TRANSLATIONS_DATA[unit][idx];
            const div = document.createElement('div');
            div.style.cssText = 'background:rgba(0,0,0,0.2); border-radius:16px; padding:10px 14px; margin-bottom:8px; font-size:0.85rem; color:#d4eaf5; line-height:1.5;';
            div.innerHTML = `
                <span style="font-weight:600; margin-right:6px; color:${state.marked ? '#a5d6a7' : '#ef9a9a'};">${state.marked ? '✓' : '✗'}</span>
                <span>${t.english.substring(0, 50)}...</span>
            `;
            resultList.appendChild(div);
        });
    }

    btnStart.addEventListener('click', () => {
        startCards();
    });

    btnRestart.addEventListener('click', () => {
        renderLevels();
        showScreen(screenIntro);
    });

    // 初始渲染
    renderLevels();
    
    // 添加"完成"按钮到卡片界面
    const finishBtn = document.createElement('button');
    finishBtn.className = 'btn';
    finishBtn.textContent = '完成复习';
    finishBtn.style.cssText = 'margin-left:12px; font-size:0.9rem; padding:8px 16px;';
    document.querySelector('.nav-bar').appendChild(finishBtn);
    
    finishBtn.addEventListener('click', () => {
        if (confirm('确定要结束复习吗？')) {
            showResult();
        }
    });
})();
</script>
</body>
</html>
