<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>作文题 · 游戏化练习</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 8px;
        }
        .game-container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(4px);
            padding: 1.2rem 1rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 {
            font-weight: 500;
            color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 1rem;
            font-size: 1.3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 small {
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.8;
            background: #1f4a5e;
            padding: 0.3rem 0.8rem;
            border-radius: 60px;
            border: 1px solid #8fc3d9;
        }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        .intro-text {
            color: #bfdef0;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        .intro-text strong { color: #fcdb7a; }
        
        .btn {
            background: #fad974;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #ffe399;
            letter-spacing: 0.3px;
            display: inline-block;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b3952b; }
        
        /* 单元选择 */
        .level-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }
        .level-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 8px 18px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #bfdef0;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(2px);
        }
        .level-btn:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.3);
        }
        .level-btn.active {
            background: #fad974;
            border-color: #ffe399;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
        }
        
        /* 作文题目区 */
        .topic-area {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .topic-title {
            color: #fcdb7a;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .topic-content {
            color: #e9f2f7;
            font-size: 0.95rem;
            line-height: 1.8;
        }
        
        /* 提示区 */
        .tips-area {
            background: rgba(0,0,0,0.15);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .tips-title {
            color: #fcdb7a;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .tips-content {
            color: #d4eaf5;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .tips-content ul {
            margin-left: 1.2rem;
        }
        .tips-content li {
            margin-bottom: 0.3rem;
        }
        
        /* 范文区 */
        .example-area {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .example-title {
            color: #fcdb7a;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toggle-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8rem;
            color: #bfdef0;
            cursor: pointer;
            transition: 0.15s;
        }
        .toggle-btn:hover {
            background: rgba(255,255,255,0.18);
        }
        .example-content {
            color: #e9f2f7;
            font-size: 0.9rem;
            line-height: 1.8;
            display: none;
            margin-top: 0.5rem;
        }
        .example-content.show {
            display: block;
        }
        .example-content p {
            margin-bottom: 0.8rem;
        }
        
        /* 评分标准区 */
        .criteria-area {
            background: rgba(0,0,0,0.15);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .criteria-title {
            color: #fcdb7a;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .criteria-content {
            color: #d4eaf5;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .criteria-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.5rem;
        }
        .criteria-table th,
        .criteria-table td {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px;
            text-align: left;
            font-size: 0.8rem;
        }
        .criteria-table th {
            background: rgba(255,255,255,0.1);
            color: #fcdb7a;
            font-weight: 600;
        }
        .criteria-table td {
            color: #d4eaf5;
        }
        
        /* 大纲练习游戏 */
        .outline-game {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 1rem;
            margin-top: 1rem;
        }
        .outline-title {
            color: #fcdb7a;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .outline-instruction {
            color: #bfdef0;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }
        .outline-items {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }
        @media (min-width: 480px) {
            .outline-items { grid-template-columns: 1fr 1fr; }
        }
        .outline-item {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #e9f2f7;
            cursor: move;
            transition: all 0.15s;
        }
        .outline-item:hover {
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
        }
        .outline-item.dragging {
            opacity: 0.5;
        }
        .outline-item.correct {
            border-color: #4caf50;
            background: rgba(76,175,80,0.2);
        }
        
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        @media (max-width: 480px) {
            .game-container { padding: 0.8rem 0.6rem; border-radius: 28px; }
            h1 { font-size: 1.1rem; }
            .topic-content { font-size: 0.9rem; }
            .example-content { font-size: 0.85rem; }
            .criteria-table th, .criteria-table td { font-size: 0.75rem; padding: 6px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>✍️ 作文题 <small>游戏化练习</small></h1>

    <!-- 单元选择 -->
    <div class="screen active" id="screen-select">
        <div class="intro-text">
            <p><strong>✍️ 使用说明</strong></p>
            <p>• 选择单元，查看作文题目</p>
            <p>• 阅读提示、范文和评分标准</p>
            <p>• 玩"大纲排序"游戏，练习写作结构</p>
        </div>
        <div class="level-grid" id="level-grid">
            <div class="level-btn" data-unit="U1">Unit 1</div>
            <div class="level-btn" data-unit="U3">Unit 3</div>
            <div class="level-btn" data-unit="U4">Unit 4</div>
            <div class="level-btn" data-unit="U6">Unit 6</div>
        </div>
    </div>

    <!-- 作文练习界面 -->
    <div class="screen" id="screen-writing">
        <div class="topic-area">
            <div class="topic-title">📝 作文题目</div>
            <div class="topic-content" id="topic-content"></div>
        </div>
        
        <div class="tips-area">
            <div class="tips-title">💡 写作提示</div>
            <div class="tips-content" id="tips-content"></div>
        </div>
        
        <div class="example-area">
            <div class="example-title">
                <span>📖 范文示例</span>
                <button class="toggle-btn" id="btn-toggle-example">显示/隐藏</button>
            </div>
            <div class="example-content" id="example-content"></div>
        </div>
        
        <div class="criteria-area">
            <div class="criteria-title">📊 评分标准</div>
            <div class="criteria-content" id="criteria-content"></div>
        </div>
        
        <div class="outline-game">
            <div class="outline-title">🎮 大纲排序游戏</div>
            <div class="outline-instruction">拖动下面的句子，按正确顺序排列（点击检查答案）</div>
            <div class="outline-items" id="outline-items"></div>
            <div style="text-align: center; margin-top: 1rem;">
                <button class="btn" id="btn-check-outline">检查答案</button>
                <button class="btn" id="btn-reset-outline" style="margin-left: 8px;">重置</button>
            </div>
        </div>
        
        <div class="nav-bar">
            <button class="btn" id="btn-back-main">返回首页</button>
        </div>
    </div>
</div>

<script>
(function(){
    // 示例数据：U1 作文题
    const WRITING_DATA = {
        'U1': {
            topic: 'Directions: For this part, you are allowed 30 minutes to write a short essay entitled "Urban-Rural Integration in China" based on the following information. You should write at least 120 words but no more than 180 words.',
            tips: `
                <ul>
                    <li><strong>引言段：</strong>介绍城乡一体化的背景和重要性</li>
                    <li><strong>主体段1：</strong>说明城乡一体化的目标和措施（统筹规划、体制改革、政策调整）</li>
                    <li><strong>主体段2：</strong>讨论城乡一体化的挑战和解决方案（环境问题、社会不平等）</li>
                    <li><strong>结论段：</strong>总结城乡一体化的意义，展望未来</li>
                    <li><strong>关键词：</strong>urban-rural integration, modernization, eliminate dual structure, sustainable development</li>
                </ul>
            `,
            example: `
                <p><strong>Title: Urban-Rural Integration in China</strong></p>
                <p>Urban-rural integration is a new stage in China's development toward modernization and urbanization. It aims to eliminate the urban-rural dual economic structure through integrated planning for urban and rural development.</p>
                <p>To achieve urban-rural integration, the government should implement institutional reform and policy adjustment. This includes promoting equal access to education, healthcare, and social welfare for both urban and rural residents. Moreover, infrastructure development should be balanced between cities and the countryside.</p>
                <p>However, challenges such as environmental degradation and social inequality must be addressed. Only by greatly promoting urban-rural integration can the whole urban and rural economy develop comprehensively and sustainably. In conclusion, urban-rural integration is crucial for China's future development and the well-being of all citizens.</p>
            `,
            criteria: `
                <table class="criteria-table">
                    <tr>
                        <th>评分项</th>
                        <th>满分</th>
                        <th>标准</th>
                    </tr>
                    <tr>
                        <td>内容完整性</td>
                        <td>10分</td>
                        <td>覆盖所有要点，内容充实</td>
                    </tr>
                    <tr>
                        <td>结构清晰度</td>
                        <td>7分</td>
                        <td>段落分明，逻辑清晰</td>
                    </tr>
                    <tr>
                        <td>语言准确性</td>
                        <td>5分</td>
                        <td>语法正确，用词恰当</td>
                    </tr>
                    <tr>
                        <td>连贯与衔接</td>
                        <td>3分</td>
                        <td>使用连接词，过渡自然</td>
                    </tr>
                </table>
            `,
            outline: [
                { id: 1, text: 'Introduce the concept of urban-rural integration', order: 1 },
                { id: 2, text: 'Explain the goals: eliminate dual structure', order: 2 },
                { id: 3, text: 'Discuss measures: reform and policy adjustment', order: 3 },
                { id: 4, text: 'Address challenges: environment and inequality', order: 4 },
                { id: 5, text: 'Conclude: importance for future development', order: 5 }
            ]
        }
    };

    let state = {
        unit: null,
        outlineOrder: []
    };

    const $ = id => document.getElementById(id);
    const screenSelect = $('screen-select');
    const screenWriting = $('screen-writing');
    const levelGrid = $('level-grid');
    const topicContent = $('topic-content');
    const tipsContent = $('tips-content');
    const exampleContent = $('example-content');
    const criteriaContent = $('criteria-content');
    const outlineItems = $('outline-items');
    const btnToggleExample = $('btn-toggle-example');
    const btnCheckOutline = $('btn-check-outline');
    const btnResetOutline = $('btn-reset-outline');
    const btnBackMain = $('btn-back-main');

    // 单元选择
    levelGrid.addEventListener('click', (e) => {
        if (e.target.classList.contains('level-btn')) {
            const unit = e.target.dataset.unit;
            if (WRITING_DATA[unit]) {
                startWriting(unit);
            } else {
                alert('该单元的作文题数据正在完善中，请稍后再试！');
            }
        }
    });

    // 开始写作练习
    function startWriting(unit) {
        state.unit = unit;
        state.outlineOrder = [];
        
        screenSelect.classList.remove('active');
        screenWriting.classList.add('active');
        
        const data = WRITING_DATA[unit];
        topicContent.textContent = data.topic;
        tipsContent.innerHTML = data.tips;
        exampleContent.innerHTML = data.example;
        criteriaContent.innerHTML = data.criteria;
        
        renderOutline(data.outline);
    }

    // 渲染大纲排序游戏
    function renderOutline(outline) {
        const shuffled = shuffleArray([...outline]);
        outlineItems.innerHTML = '';
        shuffled.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'outline-item';
            div.textContent = `${idx + 1}. ${item.text}`;
            div.dataset.id = item.id;
            div.draggable = true;
            
            div.addEventListener('dragstart', (e) => {
                div.classList.add('dragging');
                e.dataTransfer.setData('text/plain', item.id);
            });
            div.addEventListener('dragend', () => {
                div.classList.remove('dragging');
            });
            div.addEventListener('dragover', (e) => {
                e.preventDefault();
            });
            div.addEventListener('drop', (e) => {
                e.preventDefault();
                const draggedId = e.dataTransfer.getData('text/plain');
                const draggedEl = outlineItems.querySelector(`[data-id="${draggedId}"]`);
                if (draggedEl && draggedEl !== div) {
                    const parent = outlineItems;
                    const items = [...parent.children];
                    const fromIndex = items.indexOf(draggedEl);
                    const toIndex = items.indexOf(div);
                    
                    if (fromIndex < toIndex) {
                        parent.insertBefore(draggedEl, div.nextSibling);
                    } else {
                        parent.insertBefore(draggedEl, div);
                    }
                }
            });
            
            outlineItems.appendChild(div);
        });
    }

    // 显示/隐藏范文
    btnToggleExample.addEventListener('click', () => {
        exampleContent.classList.toggle('show');
    });

    // 检查大纲顺序
    btnCheckOutline.addEventListener('click', () => {
        const data = WRITING_DATA[state.unit];
        const items = [...outlineItems.children];
        
        items.forEach((item, idx) => {
            const id = parseInt(item.dataset.id);
            const correctOrder = data.outline.find(o => o.id === id).order;
            
            if (correctOrder === idx + 1) {
                item.classList.add('correct');
            } else {
                item.classList.remove('correct');
            }
        });
        
        alert('绿色标记的是顺序正确的句子！');
    });

    // 重置大纲
    btnResetOutline.addEventListener('click', () => {
        const data = WRITING_DATA[state.unit];
        renderOutline(data.outline);
    });

    // 返回首页
    btnBackMain.addEventListener('click', () => {
        screenWriting.classList.remove('active');
        screenSelect.classList.add('active');
    });

    // 打乱数组
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
})();
</script>
</body>
</html>
