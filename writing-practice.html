<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>作文练习 · Writing Practice</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 12px;
        }
        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(4px);
            padding: 1.2rem 1rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 {
            font-weight: 500;
            color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 1rem;
            font-size: 1.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 small {
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.8;
            background: #1f4a5e;
            padding: 0.3rem 0.8rem;
            border-radius: 60px;
            border: 1px solid #8fc3d9;
        }
        .level-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }
        .level-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 8px 18px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #bfdef0;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(2px);
        }
        .level-btn:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.3);
        }
        .level-btn.active {
            background: #fad974;
            border-color: #ffe399;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
        }
        .prompt-box {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.2rem;
            color: #d4eaf5;
            font-size: 0.95rem;
            line-height: 1.8;
        }
        .prompt-box strong {
            color: #fcdb7a;
        }
        .writing-area {
            width: 100%;
            min-height: 200px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 1rem;
            color: #e9f2f7;
            font-size: 0.95rem;
            line-height: 1.8;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            resize: vertical;
            margin-bottom: 1rem;
        }
        .writing-area:focus {
            outline: none;
            border-color: #fad974;
        }
        .btn {
            background: #fad974;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #ffe399;
            letter-spacing: 0.3px;
            display: inline-block;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b3952b;
        }
        .sample-essay {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 1rem;
            margin-top: 1rem;
            color: #bfdef0;
            font-size: 0.9rem;
            line-height: 1.8;
            display: none;
        }
        .sample-essay.show {
            display: block;
        }
        .sample-essay h3 {
            color: #fcdb7a;
            font-size: 1rem;
            margin-bottom: 0.8rem;
        }
        .word-count {
            color: #bfdef0;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }
        .word-count strong {
            color: #fcdb7a;
        }
        .tips-box {
            background: rgba(255,255,255,0.05);
            border-left: 4px solid #fad974;
            border-radius: 0 16px 16px 0;
            padding: 0.8rem 1rem;
            margin-top: 1rem;
            color: #d4eaf5;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .tips-box h4 {
            color: #fcdb7a;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        @media (max-width: 480px) {
            .game-container {
                padding: 0.8rem 0.6rem;
                border-radius: 28px;
            }
            h1 {
                font-size: 1.1rem;
            }
            .prompt-box, .writing-area, .sample-essay {
                font-size: 0.82rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>✍️ 作文练习 <small>Writing Practice</small></h1>

    <div class="level-grid" id="levelGrid"></div>

    <div class="prompt-box" id="prompt-box">
        <strong>📝 作文题目:</strong><br>
        <span id="prompt-text">Loading...</span>
    </div>

    <div class="word-count">
        字数: <strong id="word-count">0</strong> 词
    </div>

    <textarea class="writing-area" id="writing-area" placeholder="在这里写下你的作文..."></textarea>

    <button class="btn" id="btn-view-sample">📖 查看范文</button>
    <button class="btn" id="btn-next" style="margin-left:12px; background:#264e63; color:#bfdef0; border-color:#578aa3;">▶ 下一题</button>

    <div class="sample-essay" id="sample-essay">
        <h3>📖 参考范文</h3>
        <div id="essay-content"></div>
        <div class="tips-box">
            <h4>💡 写作技巧</h4>
            <div id="tips-content"></div>
        </div>
    </div>
</div>

<script>
(function(){
    const TOPICS = [
        {
            unit: 'U1',
            title: 'Life and Logic (U1)',
            prompt: 'Some people believe that work-life balance is essential for a happy life, while others argue that dedicating oneself fully to work is the key to success. Discuss both views and give your own opinion.',
            sampleEssay: 'In today\'s fast-paced society, the issue of work-life balance has sparked much debate. Some argue that maintaining a healthy balance between work and personal life is crucial for overall well-being, while others contend that total dedication to one\'s career is necessary for success.\n\nOn the one hand, proponents of work-life balance emphasize the importance of mental and physical health. They argue that overworking can lead to stress, burnout, and strained relationships. By allocating time for family, hobbies, and relaxation, individuals can recharge and maintain productivity in the long run. Moreover, a balanced lifestyle allows for personal growth and a broader perspective, which can indirectly benefit one\'s professional life.\n\nOn the other hand, those who advocate for full dedication to work argue that exceptional achievements require singular focus. They point to successful entrepreneurs and leaders who have made significant sacrifices in their personal lives to realize their visions. From this perspective, dividing one\'s attention between work and leisure may result in mediocrity in both domains.\n\nIn my opinion, while dedication is admirable, sustainable success requires balance. Rather than viewing work and life as competing forces, we should strive for integration. This means setting clear priorities, establishing boundaries, and recognizing that personal well-being is the foundation of professional excellence. True success is not just about career accomplishments, but also about leading a fulfilling life.',
            tips: '1. 使用对比结构 (On the one hand... On the other hand...)\n2. 表达个人观点时使用 In my opinion, I believe that...\n3. 使用连接词使文章流畅 (Moreover, However, Therefore)\n4. 结尾总结观点，提出平衡的方案'
        },
        {
            unit: 'U3',
            title: 'Makerspace (U3)',
            prompt: 'Some people think that technology makes people more isolated, while others believe it brings people closer together. Discuss both views and give your opinion.',
            sampleEssay: 'Technology has profoundly transformed the way we communicate and interact with one another. While some argue that technological advancements have led to increased isolation, others contend that technology has bridged distances and fostered new forms of community. This essay will discuss both perspectives before presenting my own view.\n\nThose who believe technology isolates people often point to the decline in face-to-face interactions. It is not uncommon to see a group of friends sitting together, each engrossed in their own smartphone. Critics argue that digital communication lacks the depth and nuance of in-person conversation, leading to superficial relationships. Furthermore, the rise of social media has been linked to feelings of loneliness and social anxiety, particularly among younger generations.\n\nConversely, proponents of technology argue that it has made the world more connected than ever before. Through video calls, instant messaging, and social networking platforms, people can maintain relationships across vast distances. Technology has also enabled the formation of online communities based on shared interests, providing support and friendship to those who might otherwise feel isolated. For example, individuals with rare hobbies or health conditions can find others like them online, creating meaningful connections.\n\nIn my opinion, technology is a tool that can either isolate or connect, depending on how it is used. The key is to use technology mindfully—to complement, rather than replace, face-to-face interactions. When used intentionally, technology can enhance our relationships and expand our social circles. However, we must also be intentional about disconnecting and engaging in real-world interactions.',
            tips: '1. 使用 While 引导的对比句式\n2. 使用具体例子支持观点 (For example, ...)\n3. 表达个人观点时使用 In my opinion, The key is to...\n4. 结尾提出平衡的使用建议'
        }
    ];

    let currentTopicIndex = 0;

    const levelGrid = document.getElementById('levelGrid');
    const promptText = document.getElementById('prompt-text');
    const writingArea = document.getElementById('writing-area');
    const wordCount = document.getElementById('word-count');
    const btnViewSample = document.getElementById('btn-view-sample');
    const btnNext = document.getElementById('btn-next');
    const sampleEssay = document.getElementById('sample-essay');
    const essayContent = document.getElementById('essay-content');
    const tipsContent = document.getElementById('tips-content');

    function renderLevels() {
        levelGrid.innerHTML = '';
        TOPICS.forEach((topic, idx) => {
            const btn = document.createElement('button');
            btn.className = 'level-btn' + (idx === currentTopicIndex ? ' active' : '');
            btn.textContent = topic.unit;
            btn.addEventListener('click', () => {
                currentTopicIndex = idx;
                renderLevels();
                loadTopic();
            });
            levelGrid.appendChild(btn);
        });
    }

    function loadTopic() {
        const topic = TOPICS[currentTopicIndex];
        promptText.textContent = topic.prompt;
        writingArea.value = '';
        sampleEssay.classList.remove('show');
        updateWordCount();
    }

    function updateWordCount() {
        const text = writingArea.value.trim();
        const count = text === '' ? 0 : text.split(/\s+/).length;
        wordCount.textContent = count;
    }

    writingArea.addEventListener('input', updateWordCount);

    btnViewSample.addEventListener('click', () => {
        const topic = TOPICS[currentTopicIndex];
        essayContent.innerHTML = topic.sampleEssay.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
        tipsContent.innerHTML = topic.tips.replace(/\n/g, '<br>');
        sampleEssay.classList.add('show');
        btnViewSample.textContent = '🔒 隐藏范文';
        btnViewSample.onclick = hideSample;
    });

    function hideSample() {
        sampleEssay.classList.remove('show');
        btnViewSample.textContent = '📖 查看范文';
        btnViewSample.onclick = () => btnViewSample.click(); // Reset to original handler
    }

    btnNext.addEventListener('click', () => {
        currentTopicIndex = (currentTopicIndex + 1) % TOPICS.length;
        renderLevels();
        loadTopic();
        btnViewSample.textContent = '📖 查看范文';
        btnViewSample.onclick = () => btnViewSample.click();
    });

    // Initialize
    renderLevels();
    loadTopic();
})();
</script>
</body>
</html>
